<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - BD SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#16a34a;--danger:#ef4444;--warning:#f59e0b;--info:#6366f1;--gradient:linear-gradient(135deg,#2563eb 0%,#1e40af 100%);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}
body{background:linear-gradient(135deg,#dbeafe 0%,#eff6ff 50%,#f0f9ff 100%);padding:20px;min-height:100vh;}

.container{max-width:900px;margin:40px auto;}

/* Glass Card */
.card{background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:30px;padding:40px;box-shadow:0 25px 70px rgba(37,99,235,.15);border:1px solid rgba(255,255,255,0.5);}
h1{text-align:center;font-weight:900;margin-bottom:30px;font-size:32px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s infinite;}
@keyframes shine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Search Box Premium */
.search-box{display:flex;gap:15px;margin-bottom:35px;}
.search-box input{flex:1;padding:18px 22px;border:2px solid rgba(37,99,235,0.2);border-radius:18px;font-size:16px;background:rgba(255,255,255,0.8);transition:.3s;font-weight:600;}
.search-box input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 5px rgba(37,99,235,.15);background:#fff;}
.search-box button{padding:18px 32px;background:var(--gradient);border:none;border-radius:18px;color:#fff;font-weight:800;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(37,99,235,.4);}
.search-box button:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 15px 40px rgba(37,99,235,.5);}

/* Result */
.result{display:none;animation:slideUp.5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding:20px;background:linear-gradient(135deg,rgba(37,99,235,0.1),rgba(22,163,74,0.1));border-radius:20px;border:1px solid rgba(37,99,235,0.2);}
.order-id{font-size:24px;font-weight:900;color:#1e293b;}
.order-id span{color:var(--primary);background:rgba(37,99,235,0.1);padding:4px 10px;border-radius:8px;}

/* Status Badge Premium */
.status-badge{padding:12px 22px;border-radius:15px;font-weight:900;color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:1px;box-shadow:0 6px 20px rgba(0,0,0,.15);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* Status Colors */
.status-New{background:linear-gradient(135deg,#2563eb,#1e40af);}
.status-Confirmed{background:linear-gradient(135deg,#6366f1,#4f46e5);}
.status-Shipping{background:linear-gradient(135deg,#f59e0b,#d97706);}
.status-Delivered{background:linear-gradient(135deg,#16a34a,#15803d);}
.status-Cancelled{background:linear-gradient(135deg,#ef4444,#dc2626);}

/* Tracking Steps Premium */
.track-wrapper{padding:30px;background:rgba(248,250,252,0.6);border-radius:25px;margin:30px 0;border:1px solid rgba(226,232,240,0.5);}
.track-steps{display:flex;justify-content:space-between;margin:0;position:relative;}
.track-steps::before{content:'';position:absolute;top:24px;left:5%;right:5%;height:5px;background:linear-gradient(90deg,#e2e8f0,#cbd5e1);z-index:1;border-radius:10px;}
.step{text-align:center;position:relative;z-index:2;flex:1;}
.step-icon{width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#94a3b8;font-size:20px;transition:.4s;border:4px solid #e2e8f0;box-shadow:0 5px 20px rgba(0,0,0,.08);}
.step.active.step-icon{background:var(--gradient);color:#fff;transform:scale(1.25);border-color:#fff;box-shadow:0 0 30px rgba(37,99,235,.5);animation:bounce 1s infinite;}
.step.done.step-icon{background:var(--gradient);color:#fff;border-color:#fff;box-shadow:0 0 25px rgba(37,99,235,.4);}
.step.cancel.step-icon{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border-color:#fff;box-shadow:0 0 25px rgba(239,68,68,.4);}
@keyframes bounce{0%,100%{transform:scale(1.25)}50%{transform:scale(1.35)}}
.step p{font-size:13px;color:#64748b;font-weight:700;}
.step.active p{color:var(--primary);font-weight:800;}

/* Info Grid Premium */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:30px;}
.info-item{background:linear-gradient(135deg,rgba(239,246,255,0.8),rgba(255,255,255,0.8));padding:20px;border-radius:18px;border:1px solid rgba(219,234,254,0.8);transition:.3s;}
.info-item:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(37,99,235,.1);}
.info-item label{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.info-item p{font-weight:800;margin-top:8px;color:#1e293b;font-size:16px;}

/* Products Premium */
.products-section{margin-top:30px;padding-top:25px;border-top:2px dashed rgba(226,232,240,0.8);}
.products-section h3{font-weight:800;margin-bottom:15px;font-size:18px;}
.product-row{display:flex;gap:18px;padding:18px 0;border-bottom:1px solid rgba(241,245,249,0.8);align-items:center;transition:.3s;}
.product-row:hover{background:rgba(248,250,252,0.5);border-radius:12px;padding-left:10px;}
.product-row:last-child{border:none;}
.product-row img{width:65px;height:65px;border-radius:15px;object-fit:cover;border:3px solid rgba(219,234,254,0.8);}
.product-row h4{font-size:16px;font-weight:700;margin-bottom:5px;}
.product-row p{color:var(--primary);font-weight:900;font-size:15px;}

.error-msg{text-align:center;color:var(--danger);padding:30px;font-weight:700;background:linear-gradient(135deg,#fef2f2,#fee2e2);border-radius:18px;border:2px solid rgba(239,68,68,0.2);}
.loading{text-align:center;padding:50px;color:var(--primary);font-weight:700;}
.loading i{font-size:40px;margin-bottom:15px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}

@media(max-width:600px){
  .card{padding:25px;}
  .info-grid{grid-template-columns:1fr;}
  .track-steps p{font-size:10px;}
  .track-steps::before{left:8%;right:8%;}
  .search-box{flex-direction:column;}
   h1{font-size:24px;}
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1><i class="fa-solid fa-truck-fast"></i> Track Your Order</h1>

        <div class="search-box">
            <input type="text" id="orderIdInput" placeholder="Enter Your Order ID: HUT12345678">
            <button onclick="trackOrder()"><i class="fa-solid fa-magnifying-glass"></i> Track Order</button>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <i class="fa-solid fa-spinner"></i>
            <p>Fetching Order Details...</p>
        </div>
        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <!-- Result -->
        <div class="result" id="resultBox">
            <div class="order-header">
                <div class="order-id">Order ID: <span id="orderIdShow"></span></div>
                <div class="status-badge" id="statusBadge"></div>
            </div>

            <!-- Tracking Steps -->
            <div class="track-wrapper">
                <div class="track-steps" id="trackSteps"></div>
            </div>

            <!-- Info -->
            <div class="info-grid">
                <div class="info-item">
                    <label>Customer Name</label>
                    <p id="customerName"></p>
                </div>
                <div class="info-item">
                    <label>Phone Number</label>
                    <p id="customerPhone"></p>
                </div>
                <div class="info-item">
                    <label>Delivery Address</label>
                    <p id="customerAddress"></p>
                </div>
                <div class="info-item">
                    <label>Total Amount</label>
                    <p id="totalAmount"></p>
                </div>
            </div>

            <!-- Products -->
            <div class="products-section">
                <h3><i class="fa-solid fa-bag-shopping"></i> Ordered Products</h3>
                <div class="products-list" id="productsList"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const steps = [
    {name: "New", icon: "fa-solid fa-file-invoice"},
    {name: "Confirmed", icon: "fa-solid fa-check-double"},
    {name: "Shipping", icon: "fa-solid fa-truck"},
    {name: "Delivered", icon: "fa-solid fa-box-open"},
    {name: "Cancelled", icon: "fa-solid fa-xmark"}
];

window.trackOrder = async () => {
    const orderId = document.getElementById('orderIdInput').value.trim();
    if(!orderId){ alert("Please enter Order ID"); return; }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';

    const q = query(collection(db, "orders"), where("orderId", "==", orderId));
    const snap = await getDocs(q);

    document.getElementById('loading').style.display = 'none';

    if(snap.empty){
        document.getElementById('errorMsg').innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Order ID not found. Please check and try again.';
        document.getElementById('errorMsg').style.display = 'block';
        return;
    }

    const order = snap.docs[0].data();
    showResult(order);
}

function showResult(order){
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('orderIdShow').innerText = order.orderId;

    const statusEl = document.getElementById('statusBadge');
    statusEl.innerText = order.status;
    statusEl.className = 'status-badge status-' + order.status;

    const stepsDiv = document.getElementById('trackSteps');
    const currentStepIndex = steps.findIndex(s => s.name == order.status);

    let stepsHTML = '';
    if(order.status == 'Cancelled'){
        stepsHTML = steps.map((s, i) => `
            <div class="step cancel">
                <div class="step-icon"><i class="${s.icon}"></i></div>
                <p>${s.name}</p>
            </div>
        `).join('');
    } else {
        stepsHTML = steps.map((s, i) => `
            <div class="step ${i < currentStepIndex? 'done' : ''} ${i == currentStepIndex? 'active' : ''}">
                <div class="step-icon"><i class="${s.icon}"></i></div>
                <p>${s.name}</p>
            </div>
        `).join('');
    }
    stepsDiv.innerHTML = stepsHTML;

    document.getElementById('customerName').innerText = order.name || '';
    document.getElementById('customerPhone').innerText = order.phone || '';
    document.getElementById('customerAddress').innerText = `${order.address || ''}, ${order.thana || ''}, ${order.district || ''}, ${order.division || ''}`;
    document.getElementById('totalAmount').innerText = '৳' + (order.total || 0).toFixed(2);

    const productsDiv = document.getElementById('productsList');
    productsDiv.innerHTML = order.items.map(item => `
        <div class="product-row">
            <img src="${item.images?.[0] || item.image}">
            <div>
                <h4>${item.name}</h4>
                <p>৳${item.price || item.currentPrice} × ${item.qty}</p>
            </div>
        </div>
    `).join('');
}

const urlParams = new URLSearchParams(window.location.search);
const idFromUrl = urlParams.get('id');
if(idFromUrl){
    document.getElementById('orderIdInput').value = idFromUrl;
    trackOrder();
}
</script>
</body>
</html>
