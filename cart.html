<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart - BD SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary:#FF6B35;
    --primary-dark:#E85A1A;
    --accent:#FFA500;
    --success:#16a34a;
    --danger:#ef4444;
    --gradient:linear-gradient(135deg,#FF6B35 0%,#FFA500 100%);
    --bg:#FFF8F3;
    --card:rgba(255,255,255,0.9);
    --text:#1A1A1A;
    --muted:#64748B;
    --border:#FFE4D6;
    --shadow:0 20px 60px rgba(255,107,53,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Bengali',sans-serif;}
body{background:linear-gradient(135deg,#FFF8F3 0%,#FFE4D6 100%);padding:20px;min-height:100vh;}

/* Header Premium */
.top-header{
    max-width:1150px;margin:0 auto 25px;display:flex;align-items:center;justify-content:space-between;
    padding:15px 0;
}
.logo{font-size:26px;font-weight:900;display:flex;gap:6px;}
.logo span:first-child{
    background:var(--gradient);color:#fff;padding:6px 12px;border-radius:12px;
    box-shadow:0 4px 15px rgba(255,107,53,0.3);
}
.logo span:last-child{color:var(--text);}
.continue-btn{
    color:var(--primary);font-weight:800;text-decoration:none;padding:10px 20px;
    border-radius:12px;background:rgba(255,107,53,0.1);transition:.3s;display:flex;align-items:center;gap:8px;
}
.continue-btn:hover{background:var(--primary);color:#fff;transform:translateX(-3px);}

/* Card Glass */
.card{
    max-width:1150px;margin:0 auto;background:var(--card);backdrop-filter:blur(25px);
    border-radius:30px;padding:40px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.5);
}
.card h2{
    font-size:28px;font-weight:900;margin-bottom:30px;display:flex;align-items:center;gap:12px;
    background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* Cart Item Premium */
.cart-item{
    display:flex;gap:25px;border:2px solid var(--border);padding:25px;border-radius:22px;margin-bottom:18px;
    background:linear-gradient(135deg,#ffffff,#FFF8F3);transition:.4s cubic-bezier(.22,1,.36,1);align-items:center;
}
.cart-item:hover{
    transform:translateY(-5px);box-shadow:0 20px 50px rgba(255,107,53,.2);border-color:var(--primary);
}
.cart-item img{
    width:110px;height:110px;object-fit:cover;border-radius:18px;border:3px solid var(--border);
    box-shadow:0 8px 20px rgba(255,107,53,0.15);
}
.info{flex:1;}
.info h4{font-size:18px;font-weight:900;margin-bottom:8px;color:var(--text);}
.info.category{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:700;}
.price{font-weight:900;color:var(--primary);font-size:20px;}
.price small{font-size:13px;color:var(--muted);font-weight:700;margin-left:4px;}
.qty-box{display:flex;gap:12px;align-items:center;margin-top:12px;}
.qty-box label{font-size:13px;color:var(--muted);font-weight:800;}
.qty{
    display:flex;gap:10px;align-items:center;background:linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,165,0,0.1));
    border-radius:15px;padding:6px;border:2px solid var(--border);
}
.qty button{
    width:36px;height:36px;border:none;border-radius:10px;background:var(--gradient);color:#fff;
    cursor:pointer;font-weight:900;font-size:16px;transition:.3s;box-shadow:0 4px 12px rgba(255,107,53,0.3);
}
.qty button:hover{transform:scale(1.15);}
.qty span{min-width:35px;text-align:center;font-weight:900;font-size:16px;}
.delete-btn{
    color:#fff;background:linear-gradient(135deg,var(--danger),#dc2626);border:none;width:45px;height:45px;
    border-radius:15px;cursor:pointer;transition:.3s;font-size:18px;box-shadow:0 6px 20px rgba(239,68,68,0.3);
}
.delete-btn:hover{background:var(--danger);transform:scale(1.15) rotate(5deg);}

/* Summary Premium */
.summary{
    border-top:3px dashed var(--border);padding-top:25px;margin-top:25px;
    background:linear-gradient(135deg,rgba(255,248,243,0.6),rgba(255,255,255,0.6));
    border-radius:20px;padding:25px;
}
.summary-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:15px;color:var(--muted);font-weight:700;}
.summary-row.total{
    font-size:24px;font-weight:900;color:var(--text);margin-top:15px;padding-top:15px;border-top:2px solid var(--border);
}
.summary-row.total span:last-child{color:var(--primary);font-size:26px;}

.checkout-btn{
    width:100%;padding:20px;margin-top:25px;background:var(--gradient);border:none;border-radius:20px;
    color:#fff;font-weight:900;font-size:19px;cursor:pointer;transition:.3s;display:flex;align-items:center;
    justify-content:center;gap:12px;box-shadow:0 12px 40px rgba(255,107,53,.4);
}
.checkout-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 18px 60px rgba(255,107,53,.5);}
.checkout-btn:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none;transform:none;}

.empty{text-align:center;color:var(--muted);padding:80px 20px;}
.empty i{font-size:80px;color:rgba(255,107,53,0.2);margin-bottom:20px;}
.empty h3{font-size:22px;color:var(--text);margin-bottom:10px;font-weight:900;}
.empty p{font-size:15px;font-weight:700;}

@media(max-width:768px){
 .cart-item{flex-direction:column;align-items:flex-start;}
 .cart-item img{width:100%;height:180px;}
 .card{padding:25px 20px;}
}
</style>
</head>
<body>

<div class="top-header">
    <div class="logo"><span>BD</span><span>SHOP</span></div>
    <a href="index.html" class="continue-btn"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
</div>

<div class="card">
    <h2><i class="fa-solid fa-cart-shopping"></i> My Shopping Cart</h2>
    <div id="cartList"></div>

    <div class="summary" id="summaryBox" style="display:none;">
        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">৳0.00</span>
        </div>
        <div class="summary-row">
            <span>Delivery</span>
            <span style="color:var(--success);font-weight:900;">Free</span>
        </div>
        <div class="summary-row total">
            <span>Grand Total</span>
            <span id="total">৳0.00</span>
        </div>
    </div>

    <button class="checkout-btn" id="checkoutBtn" onclick="goCheckout()">
        <i class="fa-solid fa-lock"></i> Proceed to Checkout
    </button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('bdshop_cart')) || []; // CHANGED

function renderCart(){
    const list = document.getElementById('cartList');
    const summaryBox = document.getElementById('summaryBox');
    const checkoutBtn = document.getElementById('checkoutBtn');

    if(cart.length == 0){
        list.innerHTML = `
        <div class='empty'>
            <i class="fa-solid fa-cart-shopping"></i>
            <h3>Your Cart is Empty</h3>
            <p>Add some amazing products to get started</p>
        </div>`;
        document.getElementById('total').innerText = '৳0.00';
        document.getElementById('subtotal').innerText = '৳0.00';
        summaryBox.style.display = 'none';
        checkoutBtn.disabled = true;
        return;
    }

    summaryBox.style.display = 'block';
    checkoutBtn.disabled = false;
    list.innerHTML = '';
    let total = 0;

    cart.forEach((item, i) => {
        total += Number(item.price || item.currentPrice) * item.qty;
        list.innerHTML += `
        <div class="cart-item">
          <img src="${item.images?.[0] || item.image}" alt="${item.name}">
            <div class="info">
                <h4>${item.name}</h4>
                <div class="category">${item.category || 'General'}</div>
                <p class="price">৳${item.price || item.currentPrice} <small>each</small></p>
                <div class="qty-box">
                    <label>Quantity:</label>
                    <div class="qty">
                        <button onclick="updateQty(${i}, -1)"><i class="fa-solid fa-minus"></i></button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty(${i}, 1)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <button class="delete-btn" onclick="removeItem(${i})"><i class="fa-solid fa-trash"></i></button>
        </div>`;
    });

    document.getElementById('subtotal').innerText = '৳' + total.toFixed(2);
    document.getElementById('total').innerText = '৳' + total.toFixed(2);
}

function updateQty(i, change){
    cart[i].qty += change;
    if(cart[i].qty < 1) cart[i].qty = 1;
    localStorage.setItem('bdshop_cart', JSON.stringify(cart)); // CHANGED
    renderCart();
    updateHeaderCart();
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem('bdshop_cart', JSON.stringify(cart)); // CHANGED
    renderCart();
    updateHeaderCart();
}

function goCheckout(){
    if(cart.length == 0){
        alert("Your cart is empty");
        return;
    }
    window.location.href = "checkout.html";
}

function updateHeaderCart(){
    const total = cart.reduce((sum, item) => sum + item.qty, 0);
    const cartCount = document.getElementById('cartCount');
    if(cartCount) cartCount.innerText = total;
}

renderCart();
</script>
</body>
</html>
